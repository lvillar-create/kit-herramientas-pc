\n    align-self:flex-start; background:#fff; color:var(--violet);\n    border-radius:999px; padding:6px 13px; font-weight:800; font-size:11px;\n    letter-spacing:.12em; text-transform:uppercase; white-space:nowrap;\n    display:inline-flex; align-items:center; gap:7px;\n  }\n  .cta .badge svg { width:13px; height:13px; }\n\n  .cta h2 { font-size:25px; font-weight:800; line-height:1.12; letter-spacing:-.02em; }\n  .cta .desc { font-size:14.5px; line-height:1.5; color:rgba(255,255,255,.92); }\n\n  /* ¿Qué incluye? */\n  .cta .includes { background:rgba(255,255,255,.1); border-radius:16px; padding:15px 17px; display:flex; flex-direction:column; gap:11px; }\n  .cta .includes .ih { display:flex; align-items:center; justify-content:space-between; gap:10px; }\n  .cta .includes .ih .t { font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.78); white-space:nowrap; }\n  .cta .includes .ih .time { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; color:var(--violet); background:#fff; border-radius:999px; padding:4px 10px; white-space:nowrap; }\n  .cta .includes .ih .time svg { width:12px; height:12px; }\n  .cta .includes .irow { display:flex; align-items:center; gap:11px; }\n  .cta .includes .irow .ico { flex-shrink:0; width:30px; height:30px; border-radius:9px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; }\n  .cta .includes .irow .ico svg { width:16px; height:16px; }\n  .cta .includes .irow .it { font-size:13.5px; font-weight:600; line-height:1.35; color:rgba(255,255,255,.95); }\n  .cta .includes .irow .it b { font-weight:800; }\n\n  /* Barra de acción */\n  .cta .action {\n    position:relative; z-index:2;\n    background:rgba(255,255,255,.12);\n    border-top:1px solid rgba(255,255,255,.18);\n    padding:17px 30px;\n    display:flex; align-items:center; justify-content:space-between; gap:12px;\n  }\n  .cta .action .label { display:flex; align-items:center; gap:10px; font-weight:800; font-size:16px; white-space:nowrap; }\n  .cta .action .label .mp { width:20px; height:20px; opacity:.95; }\n  .cta .arrow {\n    width:38px; height:38px; border-radius:50%; background:#fff; color:var(--violet);\n    display:flex; align-items:center; justify-content:center; flex-shrink:0;\n    transition:transform .22s cubic-bezier(.2,.7,.3,1);\n  }\n  .cta:hover .arrow, .cta:focus-visible .arrow { transform:translateX(4px); }\n  .cta .arrow svg { width:19px; height:19px; }\n\n  /* Brand */\n  .cta .brand { position:relative; z-index:2; padding:0 30px 22px; display:flex; align-items:center; gap:9px; }\n  .cta .brand img { height:22px; filter:brightness(0) invert(1); opacity:.85; }\n  .cta .brand .hint { font-size:12px; color:rgba(255,255,255,.7); margin-left:auto; display:inline-flex; align-items:center; gap:6px; }\n  .cta .brand .hint svg { width:13px; height:13px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <!-- Reemplazá el href por la URL pública de tu herramienta (GitHub Pages) -->\n  <a class=\"cta\" href=\"https://lvillar-create.github.io/kit-herramientas-pc/participacion/\" target=\"_blank\" rel=\"noopener\">\n    <div class=\"body\">\n      <div class=\"top\">\n        <div class=\"icon\"><i data-lucide=\"scale\"><\u002Fi><\u002Fdiv>\n        <span class=\"badge\"><i data-lucide=\"hand-helping\"><\u002Fi>Ficha de acción<\u002Fspan>\n      <\u002Fdiv>\n      <h2>Participación equitativa en actividades digitales<\u002Fh2>\n      <p class=\"desc\">Que todas y todos accedan por igual a los roles técnicos.<\u002Fp>\n      <div class=\"includes\">\n        <div class=\"ih\">\n          <span class=\"t\">¿Qué incluye?<\u002Fspan>\n          <span class=\"time\"><i data-lucide=\"clock\"><\u002Fi>Breve, al pasar<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"irow\"><span class=\"ico\"><i data-lucide=\"list-checks\"><\u002Fi><\u002Fspan><span class=\"it\"><b>Para hacer en clase:<\u002Fb> unos pasos simples mientras das
